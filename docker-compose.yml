version: "3.8"

services:
  app:
    build: .
    container_name: beacon-app
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      - DATABASE_URL=postgresql://beacon:beacon@db:5432/beacon
      - REDIS_URL=redis://redis:6379
      - BREVO_API_KEY=${BREVO_API_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - BASE_URL=https://beacon.pluginsynthesis.com
      - SESSION_SECRET=${SESSION_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    container_name: beacon-worker
    restart: unless-stopped
    command: ["node", "dist/worker/index.js"]
    environment:
      - DATABASE_URL=postgresql://beacon:beacon@db:5432/beacon
      - REDIS_URL=redis://redis:6379
      - BREVO_API_KEY=${BREVO_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build: .
    container_name: beacon-scheduler
    restart: unless-stopped
    command: ["node", "dist/worker/scheduler.js"]
    environment:
      - DATABASE_URL=postgresql://beacon:beacon@db:5432/beacon
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: timescale/timescaledb:latest-pg16
    container_name: beacon-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=beacon
      - POSTGRES_PASSWORD=beacon
      - POSTGRES_DB=beacon
    volumes:
      - beacon_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beacon"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: beacon-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - beacon_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  beacon_pgdata:
  beacon_redis:
