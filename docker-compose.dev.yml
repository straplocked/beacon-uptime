services:
  app:
    build:
      context: .
      target: deps
    container_name: beacon-app-dev
    restart: unless-stopped
    command: npx next dev
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3100:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://beacon:beacon@db:5432/beacon
      - REDIS_URL=redis://redis:6379
      - BASE_URL=http://localhost:3100
      - SESSION_SECRET=dev-secret-change-me-in-production-1234567890abcdef
      - BREVO_API_KEY=${BREVO_API_KEY:-}
      - FROM_EMAIL=alerts@pluginsynthesis.com
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_PRO_PRICE_ID=${STRIPE_PRO_PRICE_ID:-}
      - STRIPE_TEAM_PRICE_ID=${STRIPE_TEAM_PRICE_ID:-}
      - PROBE_REGION=us-east
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      target: deps
    container_name: beacon-worker-dev
    restart: unless-stopped
    command: npx tsx --watch src/worker/index.ts
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - DATABASE_URL=postgresql://beacon:beacon@db:5432/beacon
      - REDIS_URL=redis://redis:6379
      - BREVO_API_KEY=${BREVO_API_KEY:-}
      - FROM_EMAIL=alerts@pluginsynthesis.com
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: .
      target: deps
    container_name: beacon-scheduler-dev
    restart: unless-stopped
    command: npx tsx --watch src/worker/scheduler.ts
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - DATABASE_URL=postgresql://beacon:beacon@db:5432/beacon
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: timescale/timescaledb:latest-pg16
    container_name: beacon-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=beacon
      - POSTGRES_PASSWORD=beacon
      - POSTGRES_DB=beacon
    volumes:
      - beacon_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beacon"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: beacon-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - beacon_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  beacon_pgdata:
  beacon_redis:
