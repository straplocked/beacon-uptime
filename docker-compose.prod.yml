services:
  app:
    image: ghcr.io/straplocked/beacon-uptime:latest
    container_name: beacon-app
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      - DATABASE_URL=postgresql://beacon:${POSTGRES_PASSWORD}@db:5432/beacon
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - BREVO_API_KEY=${BREVO_API_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRO_PRICE_ID=${STRIPE_PRO_PRICE_ID}
      - STRIPE_TEAM_PRICE_ID=${STRIPE_TEAM_PRICE_ID}
      - BASE_URL=${BASE_URL}
      - SESSION_SECRET=${SESSION_SECRET}
      - FROM_EMAIL=${FROM_EMAIL:-noreply@beacon.local}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - beacon

  worker:
    image: ghcr.io/straplocked/beacon-uptime:latest
    container_name: beacon-worker
    restart: unless-stopped
    command: ["node", "dist/worker/index.js"]
    environment:
      - DATABASE_URL=postgresql://beacon:${POSTGRES_PASSWORD}@db:5432/beacon
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - BREVO_API_KEY=${BREVO_API_KEY}
      - FROM_EMAIL=${FROM_EMAIL:-noreply@beacon.local}
      - BASE_URL=${BASE_URL}
      - PROBE_REGION=${PROBE_REGION:-us-east}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - beacon

  scheduler:
    image: ghcr.io/straplocked/beacon-uptime:latest
    container_name: beacon-scheduler
    restart: unless-stopped
    command: ["node", "dist/worker/scheduler.js"]
    environment:
      - DATABASE_URL=postgresql://beacon:${POSTGRES_PASSWORD}@db:5432/beacon
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - beacon

  db:
    image: timescale/timescaledb:latest-pg16
    container_name: beacon-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=beacon
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=beacon
    volumes:
      - beacon_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beacon"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - beacon

  redis:
    image: redis:7-alpine
    container_name: beacon-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - beacon_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 192M
    networks:
      - beacon

  backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: beacon-backup
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=beacon
      - POSTGRES_USER=beacon
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=6
      - HEALTHCHECK_PORT=8080
    volumes:
      - ${BACKUP_PATH:-./backups}:/backups
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - beacon

volumes:
  beacon_pgdata:
  beacon_redis:

networks:
  beacon:
    driver: bridge
